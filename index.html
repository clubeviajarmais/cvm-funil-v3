// ── ANALYTICS ────────────────────────────────────────────────────────────────

function renderAnalytics(){
  var leads=visLeads(true);
  var closed=leads.filter(function(l){return l.stage==='fechado'||l.stage==='posvenda';});
  var lost=leads.filter(function(l){return l.lost&&l.lostReason;});
  var destMap={};
  closed.forEach(function(l){if(!l.destination)return;if(!destMap[l.destination])destMap[l.destination]={cnt:0,gmv:0};destMap[l.destination].cnt++;destMap[l.destination].gmv+=(l.gmv||0);});
  var destArr=Object.keys(destMap).map(function(k){return {name:k,cnt:destMap[k].cnt,gmv:destMap[k].gmv};}).sort(function(a,b){return b.gmv-a.gmv;});
  var maxGmv=destArr.length?destArr[0].gmv:1;
  var lossMap={};
  lost.forEach(function(l){var r=(l.lostReason||'').split(' — ')[0];lossMap[r]=(lossMap[r]||0)+1;});
  var lossArr=Object.keys(lossMap).map(function(k){return {r:k,c:lossMap[k]};}).sort(function(a,b){return b.c-a.c;});
  var npsLeads=leads.filter(function(l){return l.nps!==null&&l.nps!==undefined;});
  var npsPro=npsLeads.filter(function(l){return l.nps>=9;}).length;
  var npsNeu=npsLeads.filter(function(l){return l.nps>=7&&l.nps<=8;}).length;
  var npsDet=npsLeads.filter(function(l){return l.nps<=6;}).length;
  var npsScore=npsLeads.length?Math.round((npsPro-npsDet)/npsLeads.length*100):null;
  var upsellM=calcUpsell(closed);
  // ── TEMPO MÉDIO DE FECHAMENTO ──
  var closedWithDates=closed.filter(function(l){return l.entryDate&&(l.saleDate||l.closedDate);});
  var avgDays=0;var minDays=0;var maxDays=0;var fastBuyers=[];var slowBuyers=[];
  if(closedWithDates.length){
    var daysArr=closedWithDates.map(function(l){
      var sale=new Date((l.saleDate||l.closedDate)+'T00:00:00');
      var entry=new Date(l.entryDate+'T00:00:00');
      return Math.max(0,Math.floor((sale.getTime()-entry.getTime())/86400000));
    });
    avgDays=Math.round(daysArr.reduce(function(a,b){return a+b;},0)/daysArr.length);
    minDays=Math.min.apply(null,daysArr);
    maxDays=Math.max.apply(null,daysArr);
    fastBuyers=closedWithDates.filter(function(l){var d=Math.floor((new Date((l.saleDate||l.closedDate)+'T00:00:00')-new Date(l.entryDate+'T00:00:00'))/86400000);return d<=avgDays;});
    slowBuyers=closedWithDates.filter(function(l){var d=Math.floor((new Date((l.saleDate||l.closedDate)+'T00:00:00')-new Date(l.entryDate+'T00:00:00'))/86400000);return d>avgDays;});
  }
  // Perfil ideal: fonte + destino + produto mais comum entre rápidos
  var fastSrcMap={};var fastDestMap={};
  fastBuyers.forEach(function(l){
    if(l.source)fastSrcMap[l.source]=(fastSrcMap[l.source]||0)+1;
    if(l.destination){var d=l.destination.split('(')[0].trim();fastDestMap[d]=(fastDestMap[d]||0)+1;}
  });
  var topSrc=Object.keys(fastSrcMap).sort(function(a,b){return fastSrcMap[b]-fastSrcMap[a];})[0];
  var topDest=Object.keys(fastDestMap).sort(function(a,b){return fastDestMap[b]-fastDestMap[a];})[0];
  var conv=leads.length?Math.round(closed.length/leads.length*100):0;
  var h='';
  h+='<div class="page-header"><div><div class="page-title">🔍 Analytics</div></div></div>';
  h+='<div class="grid-4">';
  h+=kpi(' green','🏆','Vendas Fechadas',closed.length,'','');
  h+=kpi('','🔄','Conversão',conv+'%','','');
  h+=kpi(npsScore!==null?(npsScore>=30?' green':' orange'):'','⭐','NPS Score',npsScore!==null?npsScore:'—','','');
  h+=kpi('','📡','Canais',Object.keys(leads.reduce(function(a,l){if(l.source)a[l.source]=1;return a;},{})).length,'fontes ativas','');
  h+='</div>';
  // Tempo de fechamento card
  h+='<div class="card" style="margin-bottom:20px;border-top:3px solid var(--teal);">';
  h+='<div class="card-title">⏱️ Tempo de Fechamento & Perfil do Comprador</div>';
  if(!closedWithDates.length){
    h+='<div class="alert info"><div class="alert-ico">📊</div><div>Cadastre leads com <strong>Data de Entrada</strong> e <strong>Data da Venda</strong> para ver o perfil ideal de compra e o tempo médio de fechamento.</div></div>';
  } else {
    h+='<div class="grid-4" style="margin-bottom:16px;">';
    h+=kpi('','📅','Média Lead→Venda',avgDays+'d','','');
    h+=kpi(' green','⚡','Mais rápido',minDays+'d','','');
    h+=kpi(' orange','🐢','Mais lento',maxDays+'d','','');
    h+=kpi('','📊','Amostras',closedWithDates.length,'vendas','');
    h+='</div>';
    h+='<div class="grid-2">';
    // Distribuição
    h+='<div><div class="sec-lbl" style="margin-bottom:10px;">Distribuição por Velocidade</div>';
    var buckets=[{label:'0–3 dias',min:0,max:3,col:'var(--green)'},{label:'4–7 dias',min:4,max:7,col:'var(--teal)'},{label:'8–14 dias',min:8,max:14,col:'var(--sky)'},{label:'15–30 dias',min:15,max:30,col:'var(--orange)'},{label:'+30 dias',min:31,max:9999,col:'var(--red)'}];
    buckets.forEach(function(b){
      var cnt=closedWithDates.filter(function(l){var d=Math.floor((new Date((l.saleDate||l.closedDate)+'T00:00:00')-new Date(l.entryDate+'T00:00:00'))/86400000);return d>=b.min&&d<=b.max;}).length;
      var pct=closedWithDates.length>0?Math.round(cnt/closedWithDates.length*100):0;
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">';
      h+='<div style="width:80px;font-size:11px;font-weight:600;color:var(--muted);">'+b.label+'</div>';
      h+='<div style="flex:1;height:8px;background:var(--bg);border-radius:20px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:'+b.col+';border-radius:20px;"></div></div>';
      h+='<div style="font-size:12px;font-weight:800;min-width:24px;color:'+b.col+';">'+cnt+'</div>';
      h+='</div>';
    });
    h+='</div>';
    // Perfil ideal comprador rápido
    h+='<div><div class="sec-lbl" style="margin-bottom:10px;">🎯 Perfil do Comprador Rápido (≤'+avgDays+'d)</div>';
    if(!fastBuyers.length){h+='<div class="alert info"><div class="alert-ico">💡</div><div>Dados insuficientes.</div></div>';}
    else{
      h+='<div style="background:linear-gradient(135deg,rgba(2,128,144,.07),rgba(2,195,154,.04));border:1px solid rgba(2,128,144,.2);border-radius:12px;padding:16px;">';
      h+='<div style="font-size:12px;color:var(--muted);margin-bottom:12px;"><strong>'+fastBuyers.length+'</strong> clientes fecharam em até <strong>'+avgDays+' dias</strong>. Foque neste perfil:</div>';
      if(topSrc){h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(2,128,144,.15);">';h+='<span style="font-size:18px;">📡</span><div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">Canal que mais converte rápido</div><div style="font-size:14px;font-weight:800;color:var(--teal);">'+topSrc+'</div></div></div>';}
      if(topDest){h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(2,128,144,.15);">';h+='<span style="font-size:18px;">🗺️</span><div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">Destino mais frequente</div><div style="font-size:14px;font-weight:800;color:var(--teal);">'+topDest+'</div></div></div>';}
      var avgBudgetFast=fastBuyers.length>0?Math.round(fastBuyers.reduce(function(a,l){return a+(l.gmv||l.budget||0);},0)/fastBuyers.length):0;
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;">';
      h+='<span style="font-size:18px;">💰</span><div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">Ticket médio</div><div style="font-size:14px;font-weight:800;color:var(--teal);">'+fmtM(avgBudgetFast)+'</div></div></div>';
      h+='</div>';
    }
    h+='</div></div>';
  }
  h+='</div>';
  h+='<div class="card"><div class="card-title">📦 Upsell</div>';
  upsellM.forEach(function(m){
    h+='<div class="ups-row"><div class="ups-icon">'+m.icon+'</div><div class="ups-info"><div class="ups-name">'+m.product+'</div><div class="ups-sub">'+m.count+'/'+closed.length+' · meta '+m.goal+'%</div></div>';
    h+='<div style="text-align:right;">';
    h+='<div class="ups-pct" style="color:'+(m.pct>=m.goal?'var(--green)':'var(--orange)')+';">'+m.pct+'%</div>';
    h+='<div class="prog-track" style="width:80px;"><div class="prog-fill" style="width:'+Math.min(m.pct,100)+'%;background:'+(m.pct>=m.goal?'var(--green)':'var(--orange)')+';"></div></div>';
    h+='</div></div>';
  });
  h+='</div>';
  h+='<div class="card"><div class="card-title">⭐ NPS</div>';
  if(!npsLeads.length){h+='<div class="empty-state" style="padding:20px;"><div class="empty-icon">⭐</div><div class="empty-text">Nenhum NPS ainda</div></div>';}
  else{

    h+='<div style="flex:1;background:#FEF3C7;border-radius:10px;padding:12px;text-align:center;"><div style="font-family:Syne,sans-serif;font-size:24px;font-weight:800;color:#92400E;">'+npsNeu+'</div><div style="font-size:11px;font-weight:700;color:#92400E;">Neutros</div></div>';
    h+='<div style="flex:1;background:#FEF2F2;border-radius:10px;padding:12px;text-align:center;"><div style="font-family:Syne,sans-serif;font-size:24px;font-weight:800;color:var(--red);">'+npsDet+'</div><div style="font-size:11px;font-weight:700;color:var(--red);">Detratores</div></div>';

    h+='</div>';
  }
  h+='</div></div>';
  h+='<div class="grid-2">';
  h+='<div class="card"><div class="card-title">🗺️ Destinos</div>';
  destArr.slice(0,10).forEach(function(d){
    h+='<div class="dest-bar"><div class="dest-name">'+d.name.split('(')[0].trim()+'</div>';
    h+='<div class="dest-track"><div class="dest-fill" style="width:'+Math.round(d.gmv/maxGmv*100)+'%;"></div></div>';
    h+='<div class="dest-val">'+d.cnt+'v · '+fmtM(d.gmv)+'</div></div>';
  });
  h+='</div>';
  h+='<div class="card"><div class="card-title">💔 Motivos de Perda</div>';
  if(!lossArr.length){h+='<div class="alert ok"><div class="alert-ico">✅</div><div>Nenhuma perda registrada.</div></div>';}
  else{
    h+='<div class="table-wrap"><table><thead><tr><th>Motivo</th><th>Qtd</th><th>%</th></tr></thead><tbody>';
    lossArr.forEach(function(x){
      h+='<tr><td style="font-size:12px;">'+x.r+'</td><td><strong>'+x.c+'</strong></td>';
      h+='<td><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(x.c/lost.length*100)+'%;background:var(--red);"></div></div>';
      h+='<span class="bar-pct">'+Math.round(x.c/lost.length*100)+'%</span></div></td></tr>';
    });
    h+='</tbody></table></div>';
  }
  h+='</div></div>';
  document.getElementById('page-content').innerHTML=h;
}

// Redefinição rápida de senha
function quickResetPw(userId,userName){
  var h='';
  h+='<div class="alert info"><div class="alert-ico">🔑</div><div>Defina a nova senha para <strong>'+userName+'</strong>. Ela entra em vigor imediatamente.</div></div>';
  h+='<div class="fg">';
  h+='<label class="flbl">Novo E-mail de acesso (opcional — deixe em branco para manter)</label>';
  h+='<input type="email" id="qr-email" class="finput" placeholder="novo@email.com"/>';
  h+='</div>';
  h+='<div class="fg" style="margin-top:10px;">';
  h+='<label class="flbl">Nova Senha <span style="color:var(--red);">*</span></label>';
  h+='<input type="text" id="qr-pw" class="finput" placeholder="Mínimo 6 caracteres" autocomplete="off"/>';
  h+='<div style="font-size:10px;color:var(--muted);margin-top:3px;">Sugestão: CVM@2026! ou o primeiro nome + ano</div>';
  h+='</div>';
  openModal('🔑 Redefinir Acesso — '+userName,h,'');
  var footer=document.getElementById('modal-footer');
  if(footer){
    footer.innerHTML='';
    var cancelBtn=document.createElement('button');cancelBtn.className='btn btn-ghost';cancelBtn.textContent='Cancelar';cancelBtn.addEventListener('click',function(){closeModal();showCredentials();});
    var saveBtn=document.createElement('button');saveBtn.className='btn btn-primary';saveBtn.textContent='💾 Salvar';
    saveBtn.addEventListener('click',function(){
      var pwEl=document.getElementById('qr-pw');
      var emailEl=document.getElementById('qr-email');
      var pw=pwEl?pwEl.value.trim():'';
      var newEmail=emailEl?emailEl.value.trim().toLowerCase():'';
      if(!pw||pw.length<6){showToast('Senha mínima 6 caracteres','error');return;}
      var users=getUsers();
      var idx=users.findIndex(function(u){return u.id===userId;});
      if(idx<0){showToast('Usuário não encontrado','error');return;}
      // Check duplicate email if changing
      if(newEmail&&newEmail!==users[idx].email){
        if(newEmail.indexOf('@')<0){showToast('E-mail inválido','error');return;}
        if(users.some(function(u){return u.id!==userId&&u.email===newEmail;})){showToast('E-mail já usado por outro colaborador','error');return;}
        users[idx].email=newEmail;
      }
      users[idx].password=pw;
      saveUsers(users);
      closeModal();
      showToast('Acesso atualizado! Login: '+(newEmail||users[idx].email)+' · Senha: '+pw,'success');
      logEvent('user_saved','Reset senha de '+userName);
      renderTeam();
    });
    footer.appendChild(cancelBtn);footer.appendChild(saveBtn);
  }
}

function saveUser(existId){
  var nEl=document.getElementById('uf-n');
  var eEl=document.getElementById('uf-e');
  var phEl=document.getElementById('uf-ph');
  var pwEl=document.getElementById('uf-pw');
  var avEl=document.getElementById('uf-av');
  var clEl=document.getElementById('uf-cl');
  var rEl=document.getElementById('uf-r');
  var lrEl=document.getElementById('uf-lr');
  var olEl=document.getElementById('uf-ol');
  var trEl=document.getElementById('uf-tr');

  var name=nEl?nEl.value.trim():'';
  var email=eEl?eEl.value.trim().toLowerCase():'';
  var phone=phEl?phEl.value.trim():'';
  var pw=pwEl?pwEl.value.trim():'';
  var avatar=(avEl&&avEl.value.trim())||name.substring(0,2).toUpperCase();
  var color=clEl?clEl.value:'#028090';
  var role=rEl?rEl.value:'consultant';
  var lr=lrEl?lrEl.value:'';
  var onLeave=olEl?olEl.checked:false;
  var inTraining=trEl?trEl.checked:false;
  var stores=[].slice.call(document.querySelectorAll('input[name=uf-s]:checked')).map(function(i){return i.value;});

  // Validações com mensagens claras
  if(!name){showToast('Informe o nome completo','error');return;}
  if(!email||email.indexOf('@')<0){showToast('Informe um e-mail válido','error');return;}
  if(!existId&&!pw){showToast('Defina uma senha inicial para o colaborador','error');return;}
  if(pw&&pw.length<6){showToast('Senha deve ter pelo menos 6 caracteres','error');return;}
  if(!stores.length){showToast('Selecione ao menos uma loja','error');return;}

  var users=getUsers();

  // Verifica e-mail duplicado (ignora o próprio usuário ao editar)
  var emailDup=users.some(function(u){return u.id!==existId&&u.email.toLowerCase()===email;});
  if(emailDup){showToast('Este e-mail já está sendo usado por outro colaborador','error');return;}

  if(existId){
    var idx=users.findIndex(function(u){return u.id===existId;});
    if(idx<0){showToast('Colaborador não encontrado','error');return;}
    users[idx]=Object.assign({},users[idx],{
      name:name,email:email,phone:phone,
      avatar:avatar,color:color,role:role,stores:stores,
      onLeave:onLeave,inTraining:inTraining,leaveReturn:lr||null
    });
    if(pw)users[idx].password=pw;
  } else {
    users.push({
      id:genId(),name:name,email:email,phone:phone,
      password:pw,role:role,avatar:avatar,color:color,
      stores:stores,active:true,onLeave:onLeave,
      inTraining:inTraining,leaveReturn:lr||null
    });
  }

  saveUsers(users);
  closeModal();

  if(!existId){
    showToast('Colaborador cadastrado! Login: '+email+' · Senha: '+pw,'success');
  } else {
    showToast('Colaborador atualizado com sucesso!','success');
  }
  logEvent('user_saved',existId?'Editou '+name:'Criou '+name+' ('+email+')');
  renderTeam();
}

function toggleUserActive(id){
  var users=getUsers();var i=users.findIndex(function(u){return u.id===id;});if(i<0)return;
  users[i].active=!users[i].active;saveUsers(users);renderTeam();

function deleteUser(id){
  var users=getUsers();
  var updated=users.filter(function(u){return u.id!==id;});
  DB.users=updated;
  supaDeleteRow('cvm_users',id).catch(function(e){console.error('deleteUser:',e);});
  logEvent('user_deleted','Excluiu usuário id='+id);
  showToast('Colaborador excluído.','warn');
  renderTeam();
}

function showPwBar(){
  var pwEl=document.getElementById('pw-n');var pw=pwEl?pwEl.value:'';
  var s=pwStrength(pw);
  var colors=['var(--red)','var(--red)','var(--orange)','var(--yellow)','var(--teal)','var(--green)'];
  var labels=['','Muito fraca','Fraca','Razoável','Boa','Forte!'];
  var bar=document.getElementById('pw-bar');var lbl=document.getElementById('pw-lbl');
  if(bar){bar.style.width=(s/5*100)+'%';bar.style.background=colors[s]||'var(--border)';}
  if(lbl){lbl.textContent=labels[s]||'';lbl.style.color=colors[s]||'';}
}

function changePassword(){
  var curEl=document.getElementById('pw-c');var nwEl=document.getElementById('pw-n');var cfEl=document.getElementById('pw-cf');var errEl=document.getElementById('pw-err');
  var cur=curEl?curEl.value:'';var nw=nwEl?nwEl.value:'';var cf=cfEl?cfEl.value:'';
  var users=getUsers();var i=users.findIndex(function(u){return u.id===S.user.id;});if(i<0)return;
  if(users[i].password!==cur){if(errEl){errEl.style.display='block';errEl.textContent='Senha atual incorreta.';}return;}
  if(nw.length<8){if(errEl){errEl.style.display='block';errEl.textContent='Mínimo 8 caracteres.';}return;}
  if(nw!==cf){if(errEl){errEl.style.display='block';errEl.textContent='As senhas não coincidem.';}return;}
  if(pwStrength(nw)<2){if(errEl){errEl.style.display='block';errEl.textContent='Senha muito fraca.';}return;}
  if(errEl)errEl.style.display='none';
  users[i].password=nw;saveUsers(users);S.user=users[i];
  logEvent('password_changed','');
  showToast('🔒 Senha alterada!','success');
  if(curEl)curEl.value='';if(nwEl)nwEl.value='';if(cfEl)cfEl.value='';
  showPwBar();
}

  h+='<input type="text" class="fsearch" id="lg-s" placeholder="🔍 Filtrar por usuário..." style="width:200px;"/>';
  h+='</div>';
  h+='<div id="logs-list" style="max-height:460px;overflow-y:auto;">'+buildLogItems(logs.slice(0,200))+'</div>';
  h+='</div>';
  var pc=document.getElementById('page-content');
  if(pc){
    pc.innerHTML=h;
    var lgF=document.getElementById('lg-f');var lgS=document.getElementById('lg-s');var expBtn=document.getElementById('log-export-btn');
    if(lgF)lgF.addEventListener('change',filterLogs);
    if(lgS)lgS.addEventListener('input',filterLogs);
    if(expBtn)expBtn.addEventListener('click',exportLogs);
  }
}

function buildLogItems(logs){
  if(!logs.length)return '<div class="empty-state" style="padding:20px;"><div class="empty-icon">📋</div><div class="empty-text">Nenhum log</div></div>';
  var aLabels={login_ok:'Login OK',login_fail:'Senha incorreta',otp_fail:'OTP inválido',otp_expired:'OTP expirado',login_blocked:'Acesso bloqueado',logout:'Saiu',password_changed:'Senha alterada',export_blocked:'Exportação bloqueada',user_saved:'Usuário salvo'};
  var h='';
  logs.forEach(function(l){
    var dotCls=l.action==='login_ok'||l.action==='logout'?'ok':l.action==='password_changed'||l.action==='user_saved'?'pw':'fail';
    var bg=l.action==='login_blocked'?'background:#FEF2F2;':l.action.indexOf('fail')>=0?'background:#FFFBEB;':'';
    h+='<div class="log-item" style="'+bg+'">';
    h+='<div class="log-dot '+dotCls+'"></div>';
    h+='<div class="log-time">'+new Date(l.timestamp).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})+'</div>';
    h+='<div class="log-user">'+(l.userName||l.userEmail||'?')+'</div>';
    h+='<div class="log-action">'+(aLabels[l.action]||l.action)+(l.extra?' · '+l.extra:'')+'</div>';
    h+='</div>';
  });
  return h;
}

function filterLogs(){
  var fEl=document.getElementById('lg-f');var sEl=document.getElementById('lg-s');
  var f=fEl?fEl.value:'';var s=sEl?sEl.value.toLowerCase():'';
  var logs=getLogs().slice(0,200);
  if(f)logs=logs.filter(function(l){return l.action===f;});
  if(s)logs=logs.filter(function(l){return (l.userName||'').toLowerCase().indexOf(s)>=0||(l.userEmail||'').toLowerCase().indexOf(s)>=0;});
  var el=document.getElementById('logs-list');if(el)el.innerHTML=buildLogItems(logs);
}

function exportLogs(){
  var logs=getLogs();
  var rows=[['Data/Hora','Usuário','E-mail','Papel','Ação','Detalhe']];
  logs.forEach(function(l){rows.push([new Date(l.timestamp).toLocaleString('pt-BR'),l.userName||'',l.userEmail||'',l.userRole||'',l.action,l.extra||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='cvm-logs.csv';a.click();
  showToast('Logs exportados!','success');
}

    h+='<strong>4.</strong> Vá em <strong>Email Templates → Create New Template</strong> e cole:<br/>';

// ── EXPORTAR HTML ATUALIZADO COM USUÁRIOS GRAVADOS ────────────────────────────
function exportUpdatedHTML(){
  showToast('Com Supabase ativo, a sincronização é automática! Não precisa mais exportar o arquivo.','info');
}

function exportLeads(){
  if(!canExport()){showToast('⛔ Exportação restrita','error');logEvent('export_blocked','leads');return;}
  var leads=visLeads(true);
  var rows=[['Nome','WhatsApp','Destino','Etapa','GMV','NPS','Loja','Consultor','Data Entrada']];
  leads.forEach(function(l){rows.push([l.name,l.whatsapp,l.destination,l.stage,l.gmv||l.budget||0,l.nps!=null?l.nps:'',l.storeId,(getUserById(l.consultantId)||{name:''}).name,l.entryDate]);});
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='cvm-leads.csv';a.click();
  showToast('Exportação iniciada!','success');
}

function exportNPS(){
  if(!canExport()){showToast('⛔ Exportação restrita','error');logEvent('export_blocked','nps');return;}
  var leads=visLeads(true).filter(function(l){return l.nps!==null;});
  var rows=[['Nome','Destino','NPS','Consultor','Loja']];
  leads.forEach(function(l){rows.push([l.name,l.destination,l.nps,(getUserById(l.consultantId)||{name:''}).name,l.storeId]);});
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='cvm-nps.csv';a.click();
  showToast('NPS exportado!','success');
}

function resetData(){
  if(!confirm('Resetar TODOS os dados?\n\nIsso apaga leads, tarefas e logs do banco de dados para TODOS os usuários.'))return;
  // Limpa memória
  DB.leads=[];DB.tasks=[];DB.logs=[];
  DB.users=DEFAULT_USERS;DB.goals=DEFAULT_GOALS;
  // Grava defaults no Supabase
  supaUpsertAll('cvm_users',DEFAULT_USERS).catch(function(e){console.error(e);});
  supaSetConfig('goals',DEFAULT_GOALS).catch(function(e){console.error(e);});
  // Apaga sessão local
  localStorage.removeItem('cvm3_session');
  showToast('Dados resetados! Recarregando...','info');
  setTimeout(function(){location.reload();},1500);
}

// ── MODAL ────────────────────────────────────────────────────────────────────

function openModal(title,body,footer){
  var titleEl=document.getElementById('modal-title');var bodyEl=document.getElementById('modal-body');var footerEl=document.getElementById('modal-footer');
  if(titleEl)titleEl.textContent=title;
  if(bodyEl)bodyEl.innerHTML=body;
  if(footerEl)footerEl.innerHTML=footer||'';
  var overlay=document.getElementById('modal-overlay');if(overlay)overlay.classList.remove('hidden');
}
function closeModal(){var overlay=document.getElementById('modal-overlay');if(overlay)overlay.classList.add('hidden');}

// ── TOAST ────────────────────────────────────────────────────────────────────

function showToast(msg,type){
  type=type||'info';
  var t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  var tc=document.getElementById('toast-container');if(tc)tc.appendChild(t);
  setTimeout(function(){t.remove();},3500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────

function init(){
  var ls=document.getElementById('loading-screen');
  if(ls)ls.style.display='flex';

  Promise.all([
    supaGetAll('cvm_users'),
    supaGetAll('cvm_leads'),
    supaGetAll('cvm_tasks'),
    supaGetAll('cvm_logs'),
    supaGetConfig('goals'),
    supaGetAll('cvm_activities')
  ]).then(function(results){
    var users=results[0]||[];
    var leads=results[1]||[];
    var tasks=results[2]||[];
    var logs=results[3]||[];
    var goals=results[4];
    var activities=results[5]||[];

    DB.users=users.length>0?users:DEFAULT_USERS;
    DB.leads=leads;
    DB.tasks=tasks;
    DB.logs=logs;
    DB.goals=goals||DEFAULT_GOALS;
    DB.activities=activities;

    // Primeira vez: grava defaults no Supabase
    if(users.length===0){
      supaUpsertAll('cvm_users',DEFAULT_USERS).catch(function(e){console.error(e);});
    }
    if(!goals){
      supaSetConfig('goals',DEFAULT_GOALS).catch(function(e){console.error(e);});
    }

    if(ls)ls.style.display='none';

    var sid=gls('session');
    if(sid){
      var u=getUsers().find(function(x){return x.id===sid;});
      if(u){
        S.user=u;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        initApp();
        return;
      }
    }
    document.getElementById('login-screen').style.display='flex';
    bindLoginEvents();

  }).catch(function(err){
    console.error('Supabase error:',err);
    if(ls){
      ls.innerHTML='<div style="text-align:center;color:#fff;max-width:480px;padding:24px;">'
        +'<div style="font-size:40px;margin-bottom:16px;">⚠️</div>'
        +'<div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin-bottom:10px;">Erro de conexão</div>'
        +'<div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:16px;line-height:1.6;">'+(err.message||'Erro ao conectar ao banco de dados.')+'</div>'
        +'<div style="background:rgba(255,255,255,.08);border-radius:10px;padding:14px;text-align:left;font-size:12px;color:rgba(255,255,255,.65);line-height:1.8;margin-bottom:18px;">'
        +'As tabelas precisam ser criadas no Supabase.<br/>Acesse: <strong>Supabase → SQL Editor → New query</strong> e execute o script de configuração.'
        +'</div>'
        +'<button onclick="location.reload()" style="padding:11px 28px;background:#02C39A;border:none;border-radius:9px;font-family:Syne,sans-serif;font-weight:800;font-size:14px;color:#0F1F45;cursor:pointer;">↺ Tentar novamente</button>'
        +'</div>';
      ls.style.display='flex';
    }
  });
}

init();
})();
</script>
